name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install nextest
        run: cargo install --locked cargo-nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo nextest run

      - name: Check for un-blessed UI snapshots
        # `cargo nextest run` already fails on a snapshot mismatch, but insta
        # leaves a pending `.snap.new` beside it. Fail loudly if any slipped into
        # the tree (a half-finished re-bless) so the diff is never silently ignored.
        run: |
          pending=$(find . -name '*.snap.new' -not -path './target/*')
          if [ -n "$pending" ]; then
            echo "::error::Un-blessed insta snapshots found. Run 'cargo insta review' and commit the .snap files:"
            echo "$pending"
            exit 1
          fi
