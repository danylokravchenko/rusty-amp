name        = "Pantera — Vulgar Display of Power"
description = "Dimebag's crushing rhythm tone: DS-1 + extreme gain, brutal mid-scoop, bone dry."

# ── Noise Gate ────────────────────────────────────────────────────────────────
# Dimebag ran a heavy gate — at this gain the amp hisses between every palm
# mute. Tight threshold snaps the gate shut in the gaps; fast release lets the
# pick attack punch through instantly without a soft fade-in.
[noise_gate]
enabled   = true
threshold = 0.28   # aggressive — kills amp hiss cleanly between riffs
release   = 0.12   # fast — gate opens instantly on pick attack

# ── Tube Screamer ─────────────────────────────────────────────────────────────
# Bypassed for Pantera — Dimebag's clean boost came from hitting the amp
# directly with the DS-1. Keeping TS here as a reference if you want to layer.
[tube_screamer]
enabled = false
drive = 0.18   # barely any drive — pure clean boost (if re-enabled)
tone  = 0.78   # bright, helps cut through dense low-end
level = 0.92   # very hot; the real distortion comes from the amp

# ── Boss DS-1 Distortion ──────────────────────────────────────────────────────
# Dimebag Darrell used a Boss DS-1 in his early career to push the amp harder.
# High drive for maximum aggression; tone on the bright side preserves pick attack.
[distortion]
enabled = true
drive = 0.72   # hard DS-1 clipping — adds the sharp, percussive edge
tone  = 0.68   # slightly bright — keeps pick-attack definition cutting through
level = 0.80   # hot signal into the amp's already cranked preamp

# ── Pre-amp EQ ────────────────────────────────────────────────────────────────
# The other half of the Furman PQ-3 trick: as well as the post-cab mid scoop,
# Dimebag's EQ sat in the amp's loop shaping what the gain stage clipped. Here it
# tightens the low end *before* the preamp (so the massive bass setting stays
# articulate instead of turning to mush) and adds a touch more pre-clip mid scoop.
[preamp_eq]
enabled = true
low  = 0.40   # ≈ −2.4 dB at 100 Hz — tightens the front end before clipping
mid  = 0.42   # ≈ −1.9 dB at 650 Hz — a little extra pre-clip hollowing
high = 0.50   # flat — the post EQ already handles the top-end lift

# ── Amp ───────────────────────────────────────────────────────────────────────
# Dimebag's actual rig was Randall solid-state, but the JCM800 pushed to
# extremes captures the same hyper-compressed, percussive character.
# Signature: maximum gain, bass heavy, treble aggressive, mids nearly absent
# (he used a Furman PQ-3 EQ for the deep mid cut on record).
[amp]
model  = "randall"
gain   = 0.93  # near maximum — every bit of preamp saturation
bass   = 0.82  # thunderous low end
mid    = 0.12  # aggressive mid scoop — deeper than Metallica
treble = 0.86  # sharp, cutting highs for pick-attack definition
presence = 0.73  # high — Randall shelf at 5 kHz reproduces the glassy top end
master = 0.65

# ── Cabinet ───────────────────────────────────────────────────────────────────
# Dimebag used Randall cabs loaded with Celestion V30s in his later years.
# The Mesa V30 sim captures the same scooped, forward-projecting character.
[cabinet]
model = "mesa"
mic_pos = 0.72   # well on-axis — Dimebag's Randall + V30 tone is famously bright and cutting
mic_blend = 0.00 # pure SM57 dynamic — Dimebag's tone is all close-mic bite
mic_room  = 0.06 # nearly dry — tight, in-your-face rhythm

# ── Parametric EQ ─────────────────────────────────────────────────────────────
# Recreates the Furman PQ-3 graphic EQ Dimebag used on "Vulgar Display" —
# an additional mid cut and treble boost on top of the amp's own tone stack.
# mid=0.18 ≈ −9 dB at 800 Hz; high=0.62 ≈ +3.6 dB at 5 kHz.
[eq]
enabled = true
low  = 0.50   # flat — bass is already massive from the amp
mid  = 0.18   # deep additional scoop — the hollow Dimebag rhythm signature
high = 0.62   # slight treble lift — extra pick-attack definition

# ── Delay ─────────────────────────────────────────────────────────────────────
# Pantera's rhythm tone is completely dry. Any delay tail would smear
# the brutal palm-mute articulation that defines the sound.
[delay]
enabled  = false
time     = 0.20
feedback = 0.25
mix      = 0.00

# ── Reverb ────────────────────────────────────────────────────────────────────
# Pantera's rhythm tone is completely dry. Any reverb tail would smear
# the brutal palm-mute articulation that defines the sound.
[reverb]
enabled = false
room = 0.10    # tiny room
damp = 0.92    # almost fully damped
mix  = 0.02    # effectively dry
