<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1a130e"/>
      <stop offset="50%" stop-color="#100b08"/>
      <stop offset="100%" stop-color="#070605"/>
    </radialGradient>

    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb070"/>
      <stop offset="55%" stop-color="#ff7b3d"/>
      <stop offset="100%" stop-color="#d9531f"/>
    </linearGradient>

    <radialGradient id="tube" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffe6c4"/>
      <stop offset="42%" stop-color="#ff9d52"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>

    <radialGradient id="amp" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#2a201a"/>
      <stop offset="100%" stop-color="#120c09"/>
    </radialGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle scanlines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.022">
    <line x1="0" y1="60"   x2="1280" y2="60"/>
    <line x1="0" y1="120"  x2="1280" y2="120"/>
    <line x1="0" y1="180"  x2="1280" y2="180"/>
    <line x1="0" y1="240"  x2="1280" y2="240"/>
    <line x1="0" y1="300"  x2="1280" y2="300"/>
    <line x1="0" y1="360"  x2="1280" y2="360"/>
    <line x1="0" y1="420"  x2="1280" y2="420"/>
    <line x1="0" y1="480"  x2="1280" y2="480"/>
    <line x1="0" y1="540"  x2="1280" y2="540"/>
  </g>

  <!-- centered icon: a small amp head with a glowing tube -->
  <g transform="translate(640,232)">
    <!-- warm glow halo -->
    <ellipse cx="0" cy="0" rx="150" ry="150" fill="#ff7b3d" opacity="0.30" filter="url(#softglow)"/>

    <!-- amp head cabinet -->
    <rect x="-130" y="-78" width="260" height="156" rx="22" fill="url(#amp)" stroke="#4a3526" stroke-width="3"/>
    <!-- grille cloth -->
    <rect x="-112" y="-60" width="150" height="120" rx="10" fill="#0c0907" stroke="#3a2a1f" stroke-width="2"/>
    <g stroke="#241913" stroke-width="2" opacity="0.9">
      <line x1="-112" y1="-44" x2="38" y2="-44"/>
      <line x1="-112" y1="-28" x2="38" y2="-28"/>
      <line x1="-112" y1="-12" x2="38" y2="-12"/>
      <line x1="-112" y1="4"   x2="38" y2="4"/>
      <line x1="-112" y1="20"  x2="38" y2="20"/>
      <line x1="-112" y1="36"  x2="38" y2="36"/>
      <line x1="-112" y1="52"  x2="38" y2="52"/>
    </g>

    <!-- glowing vacuum tube on the right -->
    <g transform="translate(82,4)">
      <rect x="-26" y="-52" width="52" height="100" rx="25" fill="url(#tube)" filter="url(#glow)"/>
      <line x1="0" y1="-38" x2="0" y2="38" stroke="#fff2dc" stroke-width="3" opacity="0.85"/>
      <path d="M -10 -30 Q 0 -16 -10 -2 Q 0 12 -10 30" fill="none" stroke="#ffe9c9" stroke-width="2" opacity="0.7"/>
      <path d="M 10 -30 Q 0 -16 10 -2 Q 0 12 10 30" fill="none" stroke="#ffe9c9" stroke-width="2" opacity="0.7"/>
    </g>

    <!-- control knobs along the top -->
    <g fill="#1c140f" stroke="#4a3526" stroke-width="2">
      <g transform="translate(-92,-78)"><circle r="9"/><line x1="0" y1="0" x2="5" y2="-7" stroke="#ff7b3d" stroke-width="2.5" stroke-linecap="round"/></g>
      <g transform="translate(-60,-78)"><circle r="9"/><line x1="0" y1="0" x2="-3" y2="-8" stroke="#ff7b3d" stroke-width="2.5" stroke-linecap="round"/></g>
      <g transform="translate(-28,-78)"><circle r="9"/><line x1="0" y1="0" x2="7" y2="-5" stroke="#ff7b3d" stroke-width="2.5" stroke-linecap="round"/></g>
    </g>
  </g>

  <!-- wordmark -->
  <text x="640" y="430" text-anchor="middle"
        font-family="'SF Mono','DejaVu Sans Mono',monospace" font-weight="700"
        font-size="78" fill="url(#rust)" filter="url(#glow)">rusty-amp</text>

  <!-- tagline -->
  <text x="640" y="478" text-anchor="middle"
        font-family="'SF Mono','DejaVu Sans Mono',monospace" font-size="24" fill="#9c8979">
    a guitar amp &amp; pedalboard rig in your <tspan fill="#ff7b3d">terminal</tspan>
  </text>
</svg>
