name        = "Slipknot — Iowa"
description = "Mick Thomson & Jim Root's crushing modern metal tone — Mesa Dual Rectifier at full tilt."

# ── Noise Gate ────────────────────────────────────────────────────────────────
# In drop-B and drop-A tunings the low strings ring uncontrollably between
# hits. A tight gate is essential — both Slipknot guitarists use one in their
# live rig. Fast release so the initial thud of each downstroke comes through
# uncompromised.
[noise_gate]
enabled   = true
threshold = 0.30   # tight — drop tunings create extra sympathetic string noise
release   = 0.14   # fast — lets every chunk hit hard and clean

# ── Tube Screamer ─────────────────────────────────────────────────────────────
# Both Slipknot guitarists run a TS in front of the Rectifier as a tight boost.
# Low drive preserves the amp's own character; hot level saturates the input stage.
# The TS also tightens the low end, which is critical in drop-B/drop-A tunings.
[tube_screamer]
enabled = true
drive = 0.22   # nearly clean — the Mesa supplies all the real dirt
tone  = 0.72   # bright to cut through dense, down-tuned low end
level = 0.90   # very hot input — slams the Rectifier's first gain stage

# DS-1 off — Slipknot's tone comes from the Rectifier, not additional pedals.
[distortion]
enabled = false
drive = 0.40
tone  = 0.50
level = 0.65

# ── Amp ───────────────────────────────────────────────────────────────────────
# Mesa Dual Rectifier, Modern channel — the definitive modern metal amp.
# Near-maximum gain, heavy bass for the drop tuning, controlled mid scoop,
# high treble for pick-attack clarity through the dense mix.
[amp]
model  = "mesa"
gain   = 0.91  # cranked — the Rectifier's three-stage silicon compression
bass   = 0.76  # heavy — compensates for the bass loss in extreme down-tunings
mid    = 0.30  # moderate scoop — modern but not as extreme as Pantera
treble = 0.78  # sharp, defined — keeps the pick attack audible
presence = 0.64  # moderate-high — Mesa 4 kHz shelf; V30 cab already has presence
master = 0.62

# ── Cabinet ───────────────────────────────────────────────────────────────────
# Slipknot's guitarists run Mesa 4×12 cabs with Vintage 30s — the Rectifier
# was designed around this cab and the V30's presence peak complements the
# Mesa's aggressive top end perfectly.
[cabinet]
model = "mesa"
mic_pos = 0.42   # off-axis — chunky Slipknot low-end sounds heavier with a darker cab
mic_blend = 0.12 # touch of ribbon thickens the low-mids for a heavier wall
mic_room  = 0.12 # slight room for size without losing the chug's tightness

# ── Parametric EQ ─────────────────────────────────────────────────────────────
# Subtle EQ to tighten the modern metal sound — a slight mid cut to push the
# Rectifier's scoop further, and a treble lift for extra pick definition in
# the dense drop-tuning mix. high=0.60 ≈ +3 dB at 5 kHz.
[eq]
enabled = true
low  = 0.52   # very slight low boost — compensates for bass lost in the drop tuning
mid  = 0.32   # extra mid cut on top of the amp's already-scooped tone
high = 0.60   # presence lift — keeps pick attack cutting through the bass-heavy mix

# ── Delay ─────────────────────────────────────────────────────────────────────
# Heavy rhythm tones stay dry. Even a little delay smears palm mutes
# when the gain is this high — the silicon rectifier already compresses heavily.
[delay]
enabled  = false
time     = 0.25
feedback = 0.30
mix      = 0.00

# ── Reverb ────────────────────────────────────────────────────────────────────
# Heavy rhythm tones stay dry. Even a little reverb smears palm mutes
# when the gain is this high — the silicon rectifier already compresses heavily.
[reverb]
enabled = false
room = 0.20
damp = 0.80
mix  = 0.05
