name        = "Death — Human"
description = "Chuck Schuldiner's articulate death metal tone — technical clarity over brute force."

# ── Noise Gate ────────────────────────────────────────────────────────────────
# Chuck's tone is high-gain but not wall-of-sound — the gate needs to be
# present to control feedback on the fast legato runs, but the release has
# to be slow enough that sustaining lines don't get choked mid-phrase.
[noise_gate]
enabled   = true
threshold = 0.20   # moderate — tames hiss without cutting off sustain
release   = 0.28   # medium-slow — lets legato phrases sustain without choking

# ── Tube Screamer ─────────────────────────────────────────────────────────────
# Chuck used a TS-style boost in front of the Rectifier to tighten the attack
# and add sustain without smearing the fast, complex legato runs.
# Slightly more drive than a pure clean boost to add harmonic density.
[tube_screamer]
enabled = true
drive = 0.28   # light overdrive — adds density without masking individual notes
tone  = 0.68   # bright enough to preserve articulation on fast technical passages
level = 0.85   # hot input into the Rectifier

# DS-1 off — the Rectifier + TS combination is the whole tone.
[distortion]
enabled = false
drive = 0.40
tone  = 0.50
level = 0.65

# ── Amp ───────────────────────────────────────────────────────────────────────
# Mesa Dual Rectifier, the amp Chuck moved to for the "Human" / "Symbolic" era.
# The defining characteristic of Death's tone vs other death metal of the time:
# mids are NOT fully scooped — keeping them present lets individual notes speak
# through dense palm-muted passages. This is what made Chuck's riffs readable.
[amp]
model  = "mesa"
gain   = 0.82  # high but not maxed — leaves dynamic range for pick attack
bass   = 0.68  # heavy low end for the tuned-down E-standard / D-standard feel
mid    = 0.42  # key detail: mids raised well above the Pantera/Slipknot scoop
treble = 0.75  # clear, defined — pick-attack cut without becoming shrill
presence = 0.55  # moderate — mids are raised for clarity; presence just adds air
master = 0.60

# ── Cabinet ───────────────────────────────────────────────────────────────────
# Mesa 4×12 with Vintage 30s — Chuck's recorded tones had the characteristic
# V30 presence peak that sits the guitar clearly in the dense mix alongside
# the complex bass lines and drumming.
[cabinet]
model = "mesa"

# ── Parametric EQ ─────────────────────────────────────────────────────────────
# Subtle EQ to enhance technical clarity — a slight mid presence boost
# reinforces the decision to not scoop the mids in the amp. This is what
# separates Death's tone from every other death metal band of the era.
# mid=0.56 ≈ +1.8 dB at 800 Hz — barely noticeable but audibly more present.
[eq]
enabled = true
low  = 0.50   # flat — the amp's bass setting already handles the low end
mid  = 0.56   # subtle mid presence boost — reinforces note clarity in dense passages
high = 0.50   # flat — no extra treble; the V30 cab provides enough presence

# ── Delay ─────────────────────────────────────────────────────────────────────
# Death's studio recordings have no audible delay on the guitar — any trail
# would obscure the interlocking guitar lines and the fast legato runs that
# define Chuck's technical style.
[delay]
enabled  = false
time     = 0.25
feedback = 0.25
mix      = 0.00

# ── Reverb ────────────────────────────────────────────────────────────────────
# Death's studio sound is very dry and tight. The Mesa's compression provides
# natural sustain; adding reverb would wash out the interlocking guitar lines
# and obscure the technical detail that defines the band's sound.
[reverb]
enabled = false
room = 0.20
damp = 0.80
mix  = 0.05
