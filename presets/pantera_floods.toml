name        = "Pantera — Floods Solo"
description = "Dimebag's singing lead tone from Floods — emotional, sustained, unexpectedly melodic."

# ── Noise Gate ────────────────────────────────────────────────────────────────
# Looser gate for the lead — the threshold sits lower so quiet sustain tails
# pass through. Long release keeps the gate open while bent notes decay
# naturally without being cut off mid-sustain.
[noise_gate]
enabled   = true
threshold = 0.18   # lower — allows quiet sustain tails and harmonics through
release   = 0.45   # slow — gate stays open while notes decay naturally

# ── Compressor ────────────────────────────────────────────────────────────────
# Adds the singing, infinite-sustain quality the Floods solo lives on — it holds
# the level of decaying notes up so bends and vibrato ring on. Slow attack keeps
# the pick attack intact so the lead still has articulation.
[compressor]
enabled = true
sustain = 0.42   # moderate — sustain and smoothing without squashing the dynamics
attack  = 0.38   # lets the pick attack through before clamping
level   = 0.50   # unity with auto makeup

# ── Tube Screamer ─────────────────────────────────────────────────────────────
# Off — the DS-1 alone handles the boost and saturation for the solo.
[tube_screamer]
enabled = false
drive = 0.20
tone  = 0.65
level = 0.80

# ── Boss DS-1 Distortion ──────────────────────────────────────────────────────
# Light DS-1 as a lead boost — adds sustain and compression without the
# wall-of-sound aggression of the rhythm tone. The key to the singing quality.
[distortion]
enabled = true
drive = 0.38   # moderate — enough for infinite sustain, not so much it smears legato
tone  = 0.58   # slightly warm — smooths the Randall's glassy top end for lead work
level = 0.75

# ── Amp ───────────────────────────────────────────────────────────────────────
# Randall with more headroom than the rhythm preset — lets pick dynamics breathe.
# Mid knob raised significantly: that mid presence is what makes a lead "sing"
# where the rhythm is deliberately hollow.
[amp]
model  = "randall"
gain   = 0.72   # pulled back from rhythm's 0.93 — more note, less wall
bass   = 0.52   # neutral bass — keeps the low end tight without being thunderous
mid    = 0.48   # near-flat mids — the opposite of the scooped rhythm tone
treble = 0.70   # present but not ice-pick; the DS-1 tone control warms it further
presence = 0.58  # pulled back from rhythm — sustained lead notes need a warmer top
master = 0.65

# ── Cabinet ───────────────────────────────────────────────────────────────────
# Same Mesa V30 cab as the rhythm tone — consistent projection character
# across the song; the tone difference comes from amp settings and the EQ.
[cabinet]
model = "mesa"
mic_pos = 0.58   # slightly on-axis — cleaner Dimebag tone needs presence without harshness
mic_blend = 0.25 # blend in the ribbon — smooths the top for the cleaner solo voice
mic_room  = 0.35 # generous room — adds the dimension and depth a solo lives in

# ── Parametric EQ ─────────────────────────────────────────────────────────────
# No extra EQ on the lead — the amp's own tone stack with mids up is enough.
# The DS-1 tone control at 0.58 already warms the top end sufficiently.
[eq]
enabled = false
low  = 0.50
mid  = 0.50
high = 0.50

# ── Delay ─────────────────────────────────────────────────────────────────────
# Subtle single-repeat delay — adds depth and sustains the singing quality of
# the lead. At 180 ms it sits just behind the note, giving space without
# smearing fast bends and vibrato.
[delay]
enabled  = true
time     = 0.36   # ~180 ms — present but not turning into obvious slap-back echo
feedback = 0.32   # one clear repeat, then gone — no buildup of repeats
mix      = 0.22   # audible but subordinate to the dry attack

# ── Reverb ────────────────────────────────────────────────────────────────────
# Some room depth — the Floods solo has a palpable sense of space in the studio
# recording. Keeps the sustain from sounding dry and lifeless.
[reverb]
enabled = true
room = 0.45   # medium room — audible tail without washing out articulation
damp = 0.55   # partially damped — rolls off highs in the tail, stays warm
mix  = 0.16   # tasteful — present but not drowning the dry signal
