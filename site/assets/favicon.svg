<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="rusty-amp">
  <defs>
    <radialGradient id="knob" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#2a201a"/>
      <stop offset="100%" stop-color="#120c09"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0b0806"/>
  <!-- warm glow ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#ff7b3d" stroke-opacity="0.22" stroke-width="5"/>
  <!-- knob body -->
  <circle cx="16" cy="16" r="10" fill="url(#knob)" stroke="#ff7b3d" stroke-width="2.5"/>
  <!-- pointer -->
  <line x1="16" y1="16" x2="16" y2="8.4" stroke="#ff7b3d" stroke-width="2.5" stroke-linecap="round"/>
</svg>
