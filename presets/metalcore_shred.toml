name        = "Metalcore — Shred Seeker"
description = "Modern metalcore shred tone: tight djent-adjacent rhythm, singing high-gain leads with harmonic pinches."

# ── Noise Gate ────────────────────────────────────────────────────────────────
# The Skreamer at this drive level adds its own hiss on top of the amp's noise.
# Moderate threshold keeps the gate silent between runs without snapping shut
# on the tail of sustained bends.
[noise_gate]
enabled   = true
threshold = 0.24
release   = 0.18

# ── Tube Screamer (Skreamer) ──────────────────────────────────────────────────
# Guitar Rig's Skreamer Drive is cranked to ~7/10 — far more than a clean boost.
# This pushes the amp's front end hard and adds harmonic density before the
# preamp stages. Tone at noon; Volume hot so the amp's input is slammed.
[tube_screamer]
enabled = true
drive = 0.68   # ~7/10 on the Skreamer — genuine overdrive, not just a boost
tone  = 0.52   # neutral tone — the amp's own EQ does the sculpting
level = 0.82   # hot into the amp — saturates the first gain stage further

# DS-1 off — Skreamer is already doing the dirt work in front of the amp.
[distortion]
enabled = false
drive = 0.40
tone  = 0.55
level = 0.65

# ── Amp ───────────────────────────────────────────────────────────────────────
# Guitar Rig's Fire Seeker is a modern high-gain amp in the Diezel / Mesa
# tradition — three gain stages, tight low end, aggressive upper-mids.
# Mesa Dual Rectifier is the closest model in our chain.
#
# Knob positions read from the image:
#   Gain ~8/10 → 0.80   Low ~6/10 → 0.60   Mid ~4.5/10 → 0.44
#   Treble ~6.5/10 → 0.64   Master ~5/10 → 0.52
#
# Presence: modern high-gain amps typically run presence high for pick attack
# definition; the Skreamer's extra mid push at the front means we can keep
# the presence moderate rather than maxing it.
[amp]
model    = "mesa"
gain     = 0.80  # cranked — three-stage Rectifier compression at near-maximum
bass     = 0.60  # slightly above noon — solid low end without flabbiness
mid      = 0.44  # light scoop — articulate without going full Pantera hollow
treble   = 0.64  # defined — pick attack cuts through the Skreamer's mid push
presence = 0.62  # moderate — 4 kHz Mesa shelf adds air without harshness
master   = 0.52

# ── Cabinet ───────────────────────────────────────────────────────────────────
# Guitar Rig uses the "Fire Seeker" matched cabinet — a V30-loaded 4×12.
# Mesa V30 is the direct equivalent.
[cabinet]
model = "mesa"
mic_pos = 0.62   # on-axis — modern tight Mesa tone needs clarity for fast picking

# ── Parametric EQ ─────────────────────────────────────────────────────────────
# No post-EQ — the Skreamer + Mesa combination is already well-shaped.
# The TS mid-push into the scooped amp creates a self-balancing EQ curve;
# adding more sculpting on top would lose the natural character.
[eq]
enabled = false
low  = 0.50
mid  = 0.50
high = 0.50

# ── Delay (Delay Man) ─────────────────────────────────────────────────────────
# The Guitar Rig preset has a Delay Man active. From the signal flow it looks
# like a moderate single-repeat at medium time — adds dimension to leads
# without cluttering fast rhythm playing. Increase mix for lead lines.
[delay]
enabled  = true
time     = 0.30   # ~150 ms — sits behind the note, not an obvious slap-back
feedback = 0.28   # one clear repeat, then fades — no cascading buildup
mix      = 0.20   # noticeable depth but the dry signal still dominates

# ── Reverb ────────────────────────────────────────────────────────────────────
# The Guitar Rig preset has no reverb block visible — keeping it off here
# to match. The delay already provides spatial depth on lead lines.
[reverb]
enabled = false
room = 0.25
damp = 0.75
mix  = 0.05
